<mat-dialog-content>
  <p>
    Deseja deletar o usuário <strong>{{ data.data.first_name }} {{ data.data.last_name }}</strong
    >?
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Cancelar</button>
  <button matButton [mat-dialog-close]="true" (click)="delete()">Confirmar</button>
</mat-dialog-actions>
