<mat-dialog-content>
  <p>
    Deseja deletar o usuário <strong>{{ data.data.first_name }} {{ data.data.last_name }}</strong
    >?
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button matButton mat-dialog-close>Cancelar</button>
  <button matButton [mat-dialog-close]="true" (click)="onDelete()">
    @if (isSubmitted()) {
      <mat-progress-spinner diameter="20" mode="indeterminate" />
    } @else {
      Confirmar
    }
  </button>
</mat-dialog-actions>
