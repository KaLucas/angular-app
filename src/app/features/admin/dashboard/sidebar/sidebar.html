<aside class="flex">
  <div class="menu-wrapper flex">
    <div class="top-menu flex">
      <div class="user-summary-card flex" data-testid="user-summary-card">
        <div class="users-data flex">
          <mat-icon>groups</mat-icon>
          <p class="users-title">Total de usuários</p>
        </div>
        <p class="users-total" data-testid="sidebar-count">
          {{ store.meta()?.total }}
        </p>
        <p class="users-last-update">
          Último cadastro: {{ store.users()[0]?.created_at | date: 'dd/MM/yyyy' }}
        </p>
      </div>
    </div>
    <div class="bottom-menu">
      <div class="logout">
        <button matFab extended (click)="handleLogout()" data-testid="logout-button">
          <mat-icon>logout</mat-icon>
          Logout
        </button>
      </div>
      <mat-divider></mat-divider>
      <div class="img-wrapper">
        <img src="/assets/angular-app.png" alt="Angular App Logo" class="logo" />
      </div>
    </div>
  </div>
  <mat-divider [vertical]="true"></mat-divider>
</aside>
