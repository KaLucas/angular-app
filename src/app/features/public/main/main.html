<header class="flex">
  <h2><strong>Usuários cadastrados</strong></h2>
  <div class="actions-header flex">
    <button matIconButton (click)="theme.toggle()">
      <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <div class="redirect-button-list">
      <button matButton="elevated" (click)="goToAdmin()" data-testid="redirect-button-admin">
        Acessar admin
      </button>
    </div>
  </div>
</header>
<main>
  <div class="main-wrapper">
    <div class="main-content">
      @for (user of users(); track user.id) {
        <mat-card>
          <mat-card-content>
            <h3>{{ user.data.first_name }} {{ user.data.last_name }}</h3>
            <p>{{ user.data.email }}</p>
          </mat-card-content>
        </mat-card>
      }
    </div>
  </div>
</main>
